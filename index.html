<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Visualizer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000432;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #start-btn {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: linear-gradient(45deg, #1e3a8a, #4c1d95); /* Blue to Deep Purple */
                    color: white;
                    border: none;
                    padding: 15px 30px;
                    font-size: 18px;
                    font-weight: bold;
                    border-radius: 8px;
                    cursor: pointer;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
                    z-index: 10;
                }

                #start-btn:active {
                    transform: translate(-50%, -50%) scale(0.98);
                }

                canvas {
                    width: 100vw;
                    height: 100vh;
                    display: block;
                }
    </style>
</head>
<body>

    <button id="start-btn">Start Visualizer</button>
    <canvas id="visualizer"></canvas>

    <script>
        const startBtn = document.getElementById('start-btn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        // Set canvas resolution
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        let audioContext;
        let analyser;
        let dataArray;

        startBtn.addEventListener('click', async () => {
            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Hide button after starting
                                startBtn.style.display = 'none';

                                // Request actual fullscreen mode
                                if (document.documentElement.requestFullscreen) {
                                    document.documentElement.requestFullscreen().catch(err => console.warn("Fullscreen denied:", err));
                                }

                                // Initialize Audio Context (must be done after a user gesture like a click)
                                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                                analyser = audioContext.createAnalyser();
                
                                // Create a Gain Node to amplify the microphone signal
                                const gainNode = audioContext.createGain();
                                gainNode.gain.value = 5.0; 

                                const source = audioContext.createMediaStreamSource(stream);
                                source.connect(gainNode);
                                gainNode.connect(analyser);
                
                                // Configure analyser
                analyser.fftSize = 256; 
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                drawVisualizer(bufferLength);

            } catch (err) {
                alert("Microphone access is required for the visualizer to work.");
                console.error("Error accessing microphone:", err);
            }
        });

        let time = 0;

                function drawVisualizer(bufferLength) {
                    requestAnimationFrame(() => drawVisualizer(bufferLength));

                    analyser.getByteFrequencyData(dataArray);

                    // Trailing effect using a semi-transparent version of your preferred #000432 color
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = 'rgba(0, 4, 50, 0.35)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Add neon glow effect with overlapping lines
                    ctx.globalCompositeOperation = 'lighter';

                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;
                    time += 0.02;

                    // Get a bass value for pulsating the whole tunnel
                    let bass = 0;
                    for(let i = 0; i < 8; i++) bass += dataArray[i];
                    bass = bass / 8;
                    const bassPulse = bass / 255;

                    const numRings = 50;
                    for (let i = numRings; i > 0; i--) {
                        const z = i - (time % 1); 
                        const scale = 250 / (z + 1); 
                
                        ctx.beginPath();
                        const points = 90; 

                        for (let j = 0; j <= points; j++) {
                            const angle = (j / points) * Math.PI * 2;
                    
                            // Wrap the frequency data symmetrically so the tunnel loop meets seamlessly
                            const dataIndex = Math.floor((Math.abs(j - points/2) / (points/2)) * (bufferLength / 2.5));
                            const audioValue = dataArray[dataIndex] || 0;
                    
                            // Create the wavy distortion for the tunnel walls
                            const distortion = Math.pow((audioValue / 255), 2) * 60; 
                            const twist = z * 0.15 + time * 0.5;
                            const r = (35 + distortion + (bassPulse * 20)) * scale;
                    
                            // Flatten the y-axis a bit to give depth
                            const x = cx + Math.cos(angle + twist) * r;
                            const y = cy + Math.sin(angle + twist) * r * 0.8; 
                    
                            if (j === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                
                        ctx.closePath();
                
                        // Deep Purple to Blue palette based on depth and audio
                        const hue = 255 - (z * 2) + (bassPulse * 30); 
                        const alpha = Math.max(0, 1 - (z / numRings)); 
                
                        ctx.strokeStyle = `hsla(${hue}, 100%, 65%, ${alpha})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });
    </script>

</body>
</html>
