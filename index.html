<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Resonance</title>
<style>
  :root {
    --void: #08080c;
    --void-2: #0e0e16;
    --ember: #ff3d5a;
    --plasma: #5df5ff;
    --white-hot: #ffffff;
    --dim: #6a6a80;
    --line: #1c1c28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--void);
    color: #e8e8f0;
    font-family: 'Courier New', ui-monospace, monospace;
    overflow: hidden;
    height: 100%;
    width: 100%;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  canvas { display: block; }

  /* ---- Overlay UI ---- */
  .hud {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
  }

  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--dim);
    line-height: 1.6;
  }
  .brand b {
    display: block;
    color: #e8e8f0;
    font-size: 15px;
    letter-spacing: 0.18em;
    font-weight: 400;
  }

  .readout {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    line-height: 1.8;
  }
  .readout span { color: var(--plasma); }

  /* ---- Start screen ---- */
  #gate {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: var(--void);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 28px;
    padding: 24px;
    text-align: center;
    transition: opacity 0.6s ease, visibility 0.6s;
  }
  #gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .gate-mark {
    width: 64px;
    height: 64px;
    position: relative;
  }
  .gate-mark svg { width: 100%; height: 100%; }
  .gate-ring {
    fill: none;
    stroke: var(--ember);
    stroke-width: 1;
    opacity: 0.8;
    animation: spin 6s linear infinite;
    transform-origin: center;
  }
  .gate-ring.b { stroke: var(--plasma); animation-duration: 9s; animation-direction: reverse; opacity: 0.5; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .gate-title {
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .gate-title b { display: block; color: #f2f2f8; font-size: 22px; letter-spacing: 0.2em; margin-top: 8px; font-weight: 400; }

  .gate-copy {
    max-width: 300px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--dim);
    letter-spacing: 0.02em;
  }

  #enable {
    pointer-events: auto;
    background: transparent;
    border: 1px solid var(--ember);
    color: #ffdfe4;
    padding: 14px 36px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, color 0.25s, box-shadow 0.25s;
    border-radius: 2px;
  }
  #enable:active {
    background: var(--ember);
    color: var(--void);
    box-shadow: 0 0 30px rgba(255, 61, 90, 0.5);
  }

  .gate-error {
    max-width: 300px;
    font-size: 11px;
    line-height: 1.6;
    color: var(--ember);
    display: none;
  }
  .gate-error.show { display: block; }

  /* ---- Bottom controls ---- */
  .controls {
    pointer-events: auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 340px;
    margin: 0 auto;
  }

  .mode-btn {
    background: rgba(20, 20, 30, 0.55);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 20px;
    transition: all 0.25s;
  }
  .mode-btn.active {
    color: var(--void);
    background: var(--plasma);
    border-color: var(--plasma);
  }

  .hint {
    position: fixed;
    bottom: 78px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    z-index: 10;
    pointer-events: none;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div id="stage"></div>

<div class="hud">
  <div class="hud-top">
    <div class="brand">SIGNAL<b>RESONANCE</b></div>
    <div class="readout">
      GAIN <span id="r-gain">0.00</span><br/>
      PEAK <span id="r-peak">0 Hz</span><br/>
      STATE <span id="r-state">LIVE</span>
    </div>
  </div>
  <div>
    <div class="hint" id="hint">tap a form to switch &nbsp;·&nbsp; drag to rotate</div>
    <div class="controls">
      <button class="mode-btn active" data-mode="orb">ORB</button>
      <button class="mode-btn" data-mode="lattice">LATTICE</button>
      <button class="mode-btn" data-mode="strands">STRANDS</button>
      <button class="mode-btn" data-mode="bars">BARS</button>
      <button class="mode-btn" data-mode="tunnel">TUNNEL</button>
    </div>
  </div>
</div>

<div id="gate">
  <div class="gate-mark">
    <svg viewBox="0 0 64 64">
      <circle class="gate-ring" cx="32" cy="32" r="26"/>
      <circle class="gate-ring b" cx="32" cy="32" r="18"/>
    </svg>
  </div>
  <div class="gate-title">A THREE.JS INSTRUMENT<b>RESONANCE</b></div>
  <div class="gate-copy">
    A form that listens. Point your phone's microphone at whatever's playing &mdash; music, voice, room noise &mdash; and it becomes geometry in real time.
  </div>
  <button id="enable">Begin Listening</button>
  <div class="gate-error" id="gate-error"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  "use strict";

  // ---------------------------------------------------------------------
  // Audio engine
  // ---------------------------------------------------------------------
  let audioCtx, analyser, dataFreq, dataTime, sourceNode;
  const FFT_SIZE = 2048;
  let smoothedBass = 0, smoothedMid = 0, smoothedTreble = 0, smoothedOverall = 0;

  async function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      }
    });
    sourceNode = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = FFT_SIZE;
    analyser.smoothingTimeConstant = 0.75;
    sourceNode.connect(analyser);

    dataFreq = new Uint8Array(analyser.frequencyBinCount);
    dataTime = new Uint8Array(analyser.fftSize);
  }

  function getAudioFeatures() {
    if (!analyser) return { bass: 0, mid: 0, treble: 0, overall: 0, wave: null, peakHz: 0 };

    analyser.getByteFrequencyData(dataFreq);
    analyser.getByteTimeDomainData(dataTime);

    const nyq = audioCtx.sampleRate / 2;
    const bins = dataFreq.length;

    const bassEnd = Math.floor((250 / nyq) * bins);
    const midEnd = Math.floor((2000 / nyq) * bins);

    let bassSum = 0, midSum = 0, trebSum = 0;
    let peakVal = 0, peakIdx = 0;

    for (let i = 0; i < bins; i++) {
      const v = dataFreq[i];
      if (i < bassEnd) bassSum += v;
      else if (i < midEnd) midSum += v;
      else trebSum += v;
      if (v > peakVal) { peakVal = v; peakIdx = i; }
    }

    const bass = bassSum / (bassEnd * 255 || 1);
    const mid = midSum / ((midEnd - bassEnd) * 255 || 1);
    const treble = trebSum / ((bins - midEnd) * 255 || 1);
    const overall = (bass + mid + treble) / 3;
    const peakHz = Math.round((peakIdx / bins) * nyq);

    const smooth = 0.35;
    smoothedBass += (bass - smoothedBass) * smooth;
    smoothedMid += (mid - smoothedMid) * smooth;
    smoothedTreble += (treble - smoothedTreble) * smooth;
    smoothedOverall += (overall - smoothedOverall) * smooth;

    return {
      bass: smoothedBass,
      mid: smoothedMid,
      treble: smoothedTreble,
      overall: smoothedOverall,
      wave: dataTime,
      peakHz
    };
  }

  // ---------------------------------------------------------------------
  // Three.js scene
  // ---------------------------------------------------------------------
  const stage = document.getElementById('stage');
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x08080c, 0.045);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 8);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x08080c, 1);
  stage.appendChild(renderer.domElement);

  // subtle ambient particles (the "void")
  const dustGeo = new THREE.BufferGeometry();
  const DUST_COUNT = 600;
  const dustPos = new Float32Array(DUST_COUNT * 3);
  for (let i = 0; i < DUST_COUNT; i++) {
    const r = 12 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    dustPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    dustPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    dustPos[i * 3 + 2] = r * Math.cos(phi);
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
  const dustMat = new THREE.PointsMaterial({ color: 0x2a2a3a, size: 0.05, transparent: true, opacity: 0.5 });
  const dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  // ---- ORB: icosphere with vertex displacement ----
  const orbGroup = new THREE.Group();
  const orbGeo = new THREE.IcosahedronGeometry(2.2, 5);
  const orbBasePositions = orbGeo.attributes.position.array.slice();
  const orbMat = new THREE.MeshBasicMaterial({
    color: 0xff3d5a,
    wireframe: true,
    transparent: true,
    opacity: 0.85
  });
  const orbMesh = new THREE.Mesh(orbGeo, orbMat);
  orbGroup.add(orbMesh);

  // inner glow core
  const coreGeo = new THREE.IcosahedronGeometry(0.6, 2);
  const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  const coreMesh = new THREE.Mesh(coreGeo, coreMat);
  orbGroup.add(coreMesh);
  scene.add(orbGroup);

  // ---- LATTICE: grid of points that rise/fall with frequency bins ----
  const latticeGroup = new THREE.Group();
  const LATTICE_N = 32;
  const latticeSpacing = 0.22;
  const latticeGeo = new THREE.BufferGeometry();
  const latticeCount = LATTICE_N * LATTICE_N;
  const latticePos = new Float32Array(latticeCount * 3);
  const latticeBase = new Float32Array(latticeCount * 3);
  let li = 0;
  for (let x = 0; x < LATTICE_N; x++) {
    for (let z = 0; z < LATTICE_N; z++) {
      const px = (x - LATTICE_N / 2) * latticeSpacing;
      const pz = (z - LATTICE_N / 2) * latticeSpacing;
      latticePos[li * 3] = px;
      latticePos[li * 3 + 1] = 0;
      latticePos[li * 3 + 2] = pz;
      latticeBase[li * 3] = px;
      latticeBase[li * 3 + 1] = 0;
      latticeBase[li * 3 + 2] = pz;
      li++;
    }
  }
  latticeGeo.setAttribute('position', new THREE.BufferAttribute(latticePos, 3));
  const latticeMat = new THREE.PointsMaterial({
    color: 0x5df5ff,
    size: 0.05,
    transparent: true,
    opacity: 0.9,
    sizeAttenuation: true
  });
  const latticePoints = new THREE.Points(latticeGeo, latticeMat);
  latticeGroup.add(latticePoints);
  latticeGroup.visible = false;
  scene.add(latticeGroup);

  // ---- STRANDS: radiating waveform tendrils ----
  const strandsGroup = new THREE.Group();
  const STRAND_COUNT = 48;
  const STRAND_SEGMENTS = 64;
  const strandLines = [];
  const strandBaseDirs = [];
  for (let s = 0; s < STRAND_COUNT; s++) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array((STRAND_SEGMENTS + 1) * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const hue = s / STRAND_COUNT;
    const color = new THREE.Color().setHSL(0.95 - hue * 0.55, 0.8, 0.6);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.55 });
    const line = new THREE.Line(geo, mat);
    strandsGroup.add(line);
    strandLines.push(line);

    const theta = (s / STRAND_COUNT) * Math.PI * 2;
    strandBaseDirs.push(new THREE.Vector3(Math.cos(theta), Math.sin(theta * 1.3) * 0.4, Math.sin(theta)));
  }
  strandsGroup.visible = false;
  scene.add(strandsGroup);

  // ---- BARS: classic circular frequency spectrum (Winamp-style) ----
  const barsGroup = new THREE.Group();
  const BAR_COUNT = 64;
  const barMeshes = [];
  const barBoxGeo = new THREE.BoxGeometry(0.14, 1, 0.14);
  for (let b = 0; b < BAR_COUNT; b++) {
    const hue = 0.95 - (b / BAR_COUNT) * 0.55;
    const color = new THREE.Color().setHSL(hue, 0.85, 0.55);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
    const bar = new THREE.Mesh(barBoxGeo, mat);
    const theta = (b / BAR_COUNT) * Math.PI * 2;
    const radius = 3;
    bar.position.set(Math.cos(theta) * radius, 0, Math.sin(theta) * radius);
    bar.lookAt(0, 0, 0);
    barsGroup.add(bar);
    barMeshes.push({ mesh: bar, theta });
  }
  barsGroup.visible = false;
  scene.add(barsGroup);

  // ---- TUNNEL: pulsing concentric rings rushing toward camera ----
  const tunnelGroup = new THREE.Group();
  const TUNNEL_RINGS = 24;
  const TUNNEL_SEGMENTS = 48;
  const tunnelRings = [];
  for (let r = 0; r < TUNNEL_RINGS; r++) {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array((TUNNEL_SEGMENTS + 1) * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const hue = 0.55 + (r / TUNNEL_RINGS) * 0.4;
    const color = new THREE.Color().setHSL(hue % 1, 0.8, 0.6);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
    const ring = new THREE.LineLoop(geo, mat);
    ring.userData.baseZ = -r * 1.4;
    tunnelGroup.add(ring);
    tunnelRings.push(ring);
  }
  tunnelGroup.visible = false;
  scene.add(tunnelGroup);

  // ---------------------------------------------------------------------
  // Interaction: drag to rotate, tap buttons to switch forms
  // ---------------------------------------------------------------------
  let mode = 'orb';
  let rotY = 0, rotX = 0;
  let targetRotY = 0, targetRotX = 0;
  let dragging = false;
  let lastX = 0, lastY = 0;
  let autoRotate = true;

  function setMode(next) {
    mode = next;
    orbGroup.visible = mode === 'orb';
    latticeGroup.visible = mode === 'lattice';
    strandsGroup.visible = mode === 'strands';
    barsGroup.visible = mode === 'bars';
    tunnelGroup.visible = mode === 'tunnel';
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  }

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  function onPointerDown(x, y) {
    dragging = true;
    autoRotate = false;
    lastX = x; lastY = y;
  }
  function onPointerMove(x, y) {
    if (!dragging) return;
    const dx = x - lastX;
    const dy = y - lastY;
    targetRotY += dx * 0.005;
    targetRotX += dy * 0.005;
    targetRotX = Math.max(-0.9, Math.min(0.9, targetRotX));
    lastX = x; lastY = y;
  }
  function onPointerUp() { dragging = false; }

  renderer.domElement.addEventListener('touchstart', e => {
    if (e.target.closest('.controls')) return;
    onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', onPointerUp);

  renderer.domElement.addEventListener('mousedown', e => onPointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onPointerUp);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------------------------------------------------------------------
  // Animation loop
  // ---------------------------------------------------------------------
  const clock = new THREE.Clock();
  const rGain = document.getElementById('r-gain');
  const rPeak = document.getElementById('r-peak');
  const hint = document.getElementById('hint');
  let hintTimer = null;

  function colorForEnergy(bass, mid, treble) {
    // blend ember (bass) -> plasma (mid) -> white (treble)
    const c = new THREE.Color();
    const emberC = new THREE.Color(0xff3d5a);
    const plasmaC = new THREE.Color(0x5df5ff);
    const whiteC = new THREE.Color(0xffffff);
    const total = bass + mid + treble + 0.0001;
    c.set(0x000000);
    c.add(emberC.clone().multiplyScalar(bass / total));
    c.add(plasmaC.clone().multiplyScalar(mid / total));
    c.add(whiteC.clone().multiplyScalar(treble / total));
    return c;
  }

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = clock.getDelta();

    const feat = getAudioFeatures();
    const { bass, mid, treble, overall, wave, peakHz } = feat;

    rGain.textContent = overall.toFixed(2);
    rPeak.textContent = peakHz + ' Hz';

    if (autoRotate) {
      targetRotY += dt * 0.08;
    }
    rotY += (targetRotY - rotY) * 0.08;
    rotX += (targetRotX - rotX) * 0.08;

    const energyColor = colorForEnergy(bass, mid, treble);

    // ---- ORB ----
    if (mode === 'orb') {
      orbGroup.rotation.y = rotY;
      orbGroup.rotation.x = rotX;

      const posAttr = orbGeo.attributes.position;
      const arr = posAttr.array;
      for (let i = 0; i < arr.length; i += 3) {
        const bx = orbBasePositions[i], by = orbBasePositions[i + 1], bz = orbBasePositions[i + 2];
        const len = Math.sqrt(bx * bx + by * by + bz * bz) || 1;
        const nx = bx / len, ny = by / len, nz = bz / len;

        let waveVal = 0;
        if (wave) {
          const idx = Math.floor(((nx + 1) / 2) * (wave.length - 1));
          waveVal = (wave[idx] - 128) / 128;
        }

        const noise = Math.sin(nx * 4 + t * 1.5) * Math.cos(ny * 4 + t) * Math.sin(nz * 4 + t * 0.7);
        const displacement = 1
          + bass * 0.9 * (0.6 + 0.4 * Math.sin(t * 2 + nx * 3))
          + mid * 0.35 * noise
          + treble * 0.5 * waveVal
          + overall * 0.15;

        arr[i] = nx * len * displacement;
        arr[i + 1] = ny * len * displacement;
        arr[i + 2] = nz * len * displacement;
      }
      posAttr.needsUpdate = true;

      orbMat.color.copy(energyColor);
      const coreScale = 1 + overall * 3.5 + bass * 1.5;
      coreMesh.scale.setScalar(coreScale);
      coreMat.opacity = 0.6 + treble * 0.4;
    }

    // ---- LATTICE ----
    if (mode === 'lattice') {
      latticeGroup.rotation.y = rotY * 0.5;
      latticeGroup.rotation.x = rotX * 0.5 - 0.3;

      const posAttr = latticeGeo.attributes.position;
      const arr = posAttr.array;
      const bins = dataFreq ? dataFreq.length : 0;
      for (let x = 0; x < LATTICE_N; x++) {
        for (let z = 0; z < LATTICE_N; z++) {
          const idx = x * LATTICE_N + z;
          const bx = latticeBase[idx * 3];
          const bz = latticeBase[idx * 3 + 2];
          const dist = Math.sqrt(bx * bx + bz * bz);
          let freqVal = 0;
          if (dataFreq && bins) {
            const bin = Math.min(bins - 1, Math.floor((dist / 3.5) * bins * 0.6));
            freqVal = dataFreq[bin] / 255;
          }
          const wave = Math.sin(dist * 2 - t * 3) * 0.15;
          arr[idx * 3 + 1] = freqVal * 2.4 + wave * overall * 2 + bass * Math.sin(t * 2 + dist);
        }
      }
      posAttr.needsUpdate = true;
      latticeMat.color.copy(energyColor);
      latticeMat.size = 0.05 + overall * 0.08;
    }

    // ---- STRANDS ----
    if (mode === 'strands') {
      strandsGroup.rotation.y = rotY;
      strandsGroup.rotation.x = rotX;

      for (let s = 0; s < STRAND_COUNT; s++) {
        const line = strandLines[s];
        const posAttr = line.geometry.attributes.position;
        const arr = posAttr.array;
        const dir = strandBaseDirs[s];

        for (let seg = 0; seg <= STRAND_SEGMENTS; seg++) {
          const f = seg / STRAND_SEGMENTS;
          let waveVal = 0;
          if (dataTime) {
            const idx = Math.floor(f * (dataTime.length - 1));
            waveVal = (dataTime[idx] - 128) / 128;
          }
          const radius = f * (3.2 + bass * 2.5);
          const wob = Math.sin(f * 10 + t * 3 + s) * mid * 0.6;
          const spread = waveVal * treble * 1.2;

          const x = dir.x * radius + wob * Math.cos(t + s);
          const y = dir.y * radius + spread + Math.sin(t * 2 + f * 6 + s) * overall * 0.5;
          const z = dir.z * radius + wob * Math.sin(t + s);

          arr[seg * 3] = x;
          arr[seg * 3 + 1] = y;
          arr[seg * 3 + 2] = z;
        }
        posAttr.needsUpdate = true;
        line.material.color.copy(energyColor).lerp(new THREE.Color(0xffffff), 0.15 * (s / STRAND_COUNT));
        line.material.opacity = 0.35 + overall * 0.5;
      }
    }

    // ---- BARS ----
    if (mode === 'bars') {
      barsGroup.rotation.y = rotY;
      barsGroup.rotation.x = rotX * 0.4;

      const bins = dataFreq ? dataFreq.length : 0;
      for (let b = 0; b < BAR_COUNT; b++) {
        const { mesh, theta } = barMeshes[b];
        let freqVal = 0;
        if (dataFreq && bins) {
          const bin = Math.floor((b / BAR_COUNT) * bins * 0.5);
          freqVal = dataFreq[bin] / 255;
        }
        const height = 0.15 + freqVal * 4.5;
        mesh.scale.y = height;
        const radius = 3;
        mesh.position.set(Math.cos(theta) * radius, (height * 1) / 2 - 0.5, Math.sin(theta) * radius);
        const hue = 0.95 - (b / BAR_COUNT) * 0.55;
        mesh.material.color.setHSL(hue, 0.85, 0.4 + freqVal * 0.35);
        mesh.material.opacity = 0.75 + freqVal * 0.25;
      }
    }

    // ---- TUNNEL ----
    if (mode === 'tunnel') {
      tunnelGroup.rotation.z = t * 0.15;
      tunnelGroup.rotation.x = rotX * 0.3;
      tunnelGroup.rotation.y = rotY * 0.3;

      const speed = 3 + overall * 6;
      for (let r = 0; r < TUNNEL_RINGS; r++) {
        const ring = tunnelRings[r];
        let z = ring.userData.baseZ + t * speed;
        z = ((z % (TUNNEL_RINGS * 1.4)) + TUNNEL_RINGS * 1.4) % (TUNNEL_RINGS * 1.4);
        z = z - TUNNEL_RINGS * 1.4;
        const depthFactor = 1 - Math.abs(z) / (TUNNEL_RINGS * 1.4);

        const posAttr = ring.geometry.attributes.position;
        const arr = posAttr.array;
        const bins = dataFreq ? dataFreq.length : 0;
        for (let seg = 0; seg <= TUNNEL_SEGMENTS; seg++) {
          const f = seg / TUNNEL_SEGMENTS;
          const ang = f * Math.PI * 2;
          let freqVal = 0;
          if (dataFreq && bins) {
            const bin = Math.floor(f * bins * 0.5);
            freqVal = dataFreq[bin] / 255;
          }
          const baseRadius = 1.6 + bass * 1.2;
          const radius = baseRadius + freqVal * 1.1 + Math.sin(ang * 6 + t * 2) * mid * 0.3;
          arr[seg * 3] = Math.cos(ang) * radius;
          arr[seg * 3 + 1] = Math.sin(ang) * radius;
          arr[seg * 3 + 2] = z;
        }
        posAttr.needsUpdate = true;
        ring.material.opacity = 0.15 + depthFactor * 0.75 + treble * 0.2;
      }
    }

    // dust drifts slowly, brightens with overall energy
    dust.rotation.y = t * 0.01;
    dustMat.opacity = 0.3 + overall * 0.4;

    camera.position.x = Math.sin(t * 0.05) * 0.3;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }

  animate();

  // ---------------------------------------------------------------------
  // Gate / permission flow
  // ---------------------------------------------------------------------
  const gate = document.getElementById('gate');
  const enableBtn = document.getElementById('enable');
  const gateError = document.getElementById('gate-error');
  const rState = document.getElementById('r-state');

  enableBtn.addEventListener('click', async () => {
    enableBtn.textContent = 'Connecting…';
    try {
      await initAudio();
      gate.classList.add('hidden');
      rState.textContent = 'LIVE';
      clearTimeout(hintTimer);
      hint.style.opacity = '0.7';
      hintTimer = setTimeout(() => { hint.style.transition = 'opacity 1.5s'; hint.style.opacity = '0'; }, 5000);
    } catch (err) {
      gateError.textContent = 'Microphone access was blocked. Check your browser/site permissions for microphone, then try again.';
      gateError.classList.add('show');
      enableBtn.textContent = 'Begin Listening';
      rState.textContent = 'NO SIGNAL';
    }
  });
})();
</script>
</body>
</html>
